<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/8d9aafe57f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/main.css">
    <title>Controller T.I - LASER ELETRO</title>
</head>
<body>
    <header class="header">
        <div class="left"><a href="#">Controller D.T.I</a></div>
        <div class="right content_user"><i class="fa-solid fa-user"></i><span id="user_logged"></span></div>

        <div class="navbar">
            <ul class="nav_list">
                <li><a href="main.html">HOME</a></li>
                <li><a href="./pages/admin.html">ADMIN</a></li>
            </ul>

            <div class="logoff" id="btn_logoff"><i class="fa-solid fa-right-from-bracket"></i></div>
        </div>
    </header>
    <section class="main">
        <div class="boxs_wrapper">
            <h2 id="boxs_title">Serviços</h2>
            <span id="boxs_bar"></span>
            <div class="boxs_navs">
                <div class="box box_tasks">
                    <i class="fa-solid fa-list-check"></i>
                    <span>PENDÊNCIAS D.T.I</span>
                    <a href="/pages/tasks.html" class="link_box"></a>
                </div>
                <div class="box box_infra">
                    <i class="fa-solid fa-file-lines"></i>
                    <span>VISITAS INFRA</span>
                    <a href="/pages/visits_infra.html" class="link_box"></a>
                </div>
                <div class="box box_info">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>LOJAS</span>
                    <a href="/pages/lojas.html" class="link_box"></a>
                </div>
            </div>
        </div>

        <div class="boxs_wrapper">
            <h2 id="boxs_title">Monitoramento</h2>
            <span id="boxs_bar"></span>
            <div class="boxs_navs">
                <div class="box monitor_lojas box_monitor">
                    <i class="fa-solid fa-computer"></i>
                    <span>Monitor - Lojas</span>
                    <a href="./pages/monitor_lojas.html" class="link_box"></a>
                </div>
                <div class="box monitor_matriz box_monitor">
                    <i class="fa-solid fa-house-laptop"></i>
                    <span>Monitor - Matriz</span>
                    <a href="./pages/monitor_matriz.html" class="link_box"></a>
                </div>
                <div class="box monitor_internet box_monitor">
                    <i class="fa-solid fa-signal"></i>
                    <span>Monitor - Internet</span>
                    <a href="./pages/monitor_matriz.html" class="link_box"></a>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/logoff.js"></script>
    <script src="./js/script.js" defer></script>
</body>
</html>
