<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/8d9aafe57f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tasks.css">
    <title>Pendencias INFRA-ESTRUTURA</title>
</head>
<body>
    <header class="header">
        <div class="left"><a href="#">Controller D.T.I</a></div>
        <div class="right"><i class="fa-solid fa-user"></i></div>
    </header>

        <section class="">
        <div class="header_pending">
            <div class="left">
                <h1 id="title">Lista de pendências - Infra-Esrutura</h1>
            </div>
            <div class="right btns">
                <button class="btn_newtask transtionAll3Ease">Novo <i class="fa-solid fa-circle-plus"></i></button>
                <button class="btn_filtertask transtionAll3Ease">Filtrar por <i class="fa-solid fa-caret-down"></i></button>
            </div>
        </div>
        <ul class="task_list task_list_infra" id="listPendencias">
            <li class="task_box_wrapper">
                <div class="box_pend_info task_box_content">
                    <div class="info_loja task_box_header">
                        <h2 class="task_box_title">Cameras Expedicão</h2>
                    </div>
                    <div class="pend_more_info task_box_infos">
                        <span class="task_pend">Pendente:</span>
                        <span class="task_info">Adicionar nova camera no box 03 </span>
                        <span class="task_date">Data: 01/01/2001</span>
                        <a  class="task_email"><i class="fa-solid fa-link"></i> e-mail</a>
                    </div>
                </div>

                <div class="pend_right task_box_actions">
                    <button class="task_box_btn editTaskInfra"><i class="fa-solid fa-file-pen"></i></button>
                    <button class="task_box_btn completedTaskInfra"><i class="fa-regular fa-circle-check"></i></button>
                    <button class="task_box_btn deleteTaskInfra"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </li>
        </ul>
    </section>
</body>
</html>
